<!doctype html>
<html>
  <head>
    <title>Shop It - AI 3D Try On</title>

    <!-- Mobile Optimization -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <link rel="stylesheet" href="../css/tryon.css" />
  </head>

  <body>
    <!-- Camera -->
    <video id="video" autoplay playsinline muted></video>

    <!-- 3D Canvas -->
    <canvas id="threeCanvas"></canvas>

    <!-- Top Bar -->
    <div class="top-bar">
      <button onclick="goBack()">⬅ Back</button>
      <h2>AI Try On</h2>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button onclick="changeSize(-0.1)">−</button>
      <button onclick="changeSize(0.1)">+</button>
    </div>

    <!-- ========================= -->
    <!-- 🔥 AI MODELS (IMPORTANT) -->
    <!-- ========================= -->

    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

    <!-- Face Landmarks Detection (AI) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>

    <!-- Optional Backend (Improves Performance) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>

    <!-- ========================= -->
    <!-- 🎥 (Optional) Mediapipe -->
    <!-- ========================= -->
    <!-- Keep as fallback (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <!-- ========================= -->
    <!-- 🎮 THREE JS -->
    <!-- ========================= -->

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
        }
      }
    </script>

    <!-- ========================= -->
    <!-- 🚀 MAIN SCRIPT -->
    <!-- ========================= -->

    <script type="module" src="../js/tryon.js"></script>
  </body>
</html>
